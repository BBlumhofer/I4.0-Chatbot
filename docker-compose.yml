version: "3.9"

services:
  langgraph-server:
    build: .
    # Expose the LangGraph Server API consumed by agent-chat-ui
    command: >
      bash -c "pip install --quiet 'langgraph-cli[inmem]>=0.1.0' &&
               langgraph dev --host 0.0.0.0 --port 2024 --no-browser"
    ports:
      - "2024:2024"
    environment:
      - NEO4J_URI=bolt://172.17.12.104:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testtest
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=172.17.200.155:9092
      - OPCUA_ENDPOINT=opc.tcp://172.17.54.3:4842
      - LLM_BASE_URL=http://llm:11434/v1
      - LLM_MODEL=qwen3:8b
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8001
    depends_on:
      - redis
      - chroma
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://172.17.12.104:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testtest
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=172.17.200.155:9092
      - OPCUA_ENDPOINT=opc.tcp://172.17.54.3:4842
      - LLM_BASE_URL=http://llm:11434/v1
      - LLM_MODEL=qwen3:8b
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8001
    depends_on:
      - redis
      - chroma
    restart: unless-stopped

  agent-chat-ui:
    build:
      context: ./agent-chat-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-side: points to where langgraph-server is reachable from the host
      - NEXT_PUBLIC_API_URL=http://localhost:2024
      - NEXT_PUBLIC_ASSISTANT_ID=agent
      # Server-side proxy (route.ts passthrough)
      - LANGGRAPH_API_URL=http://langgraph-server:2024
      - LANGSMITH_API_KEY=ignore
    depends_on:
      - langgraph-server
    restart: unless-stopped

 # neo4j:
 #   image: neo4j:5
 #   ports:
 #     - "7474:7474"
 #     - "7687:7687"
 #   environment:
 #     - NEO4J_AUTH=neo4j/password
 #   volumes:
 #     - neo4j_data:/data
 #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

