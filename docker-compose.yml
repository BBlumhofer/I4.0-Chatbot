services:
  api:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NEO4J_URI=neo4j+s://database.neo4j.phuket.plant.smartfactory.de:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testtest
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=172.17.200.155:9092
      - OPCUA_ENDPOINT=opc.tcp://172.17.54.3:4842
      - OPCUA_CREDENTIALS_FILE=/app/cred.json
      - OPCUA_ENABLE_WRITE_EXECUTE=false
      - LLM_BASE_URL=http://host.docker.internal:11434/v1
      - LLM_MODEL=qwen3:32b
      - LLM_TIMEOUT_SECONDS=60
      - CHAT_ENABLE_LLM_TOOL_RESULT_SUMMARIZATION=false
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=embeddinggemma:latest
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - AGENT_REGISTRY_URL=https://agent-registry.phuket.plant.smartfactory.de/
      - AGENT_REGISTRY_KEY=
      - AGENT_REGISTRY_TIMEOUT_SECONDS=15
    depends_on:
      - redis
      - chroma
    # Health check so dependent services wait until the API is truly ready.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Open WebUI Pipelines ─────────────────────────────────────────────────────
  # The Pipelines service is the recommended production integration layer for
  # custom agents in Open WebUI.  It loads ./pipelines/i4_chatbot_pipeline.py
  # which translates Open WebUI requests into calls to our LangGraph backend
  # and forwards status events so users see live thinking indicators.
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    ports:
      - "9099:9099"
    volumes:
      - ./pipelines:/app/pipelines
    environment:
      - PIPELINES_DIR=/app/pipelines
      # Allow the pipeline to reach our API.
      - API_BASE_URL=http://api:8000
      # Override PIPELINES_API_KEY on the host for a non-default secret.
      - PIPELINES_API_KEY=${PIPELINES_API_KEY:-0p3n-w3bu!}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9099/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      # Disable the built-in Ollama integration – we only use our custom backend.
      - ENABLE_OLLAMA_API=false
      # Point Open WebUI at the Pipelines service (OpenAI-compatible gateway).
      # The Pipelines service connects to our FastAPI backend internally.
      - OPENAI_API_BASE_URLS=http://pipelines:9099
      # Default Pipelines authentication key.  Override in production via
      # the PIPELINES_API_KEY environment variable on the host.
      - OPENAI_API_KEYS=${PIPELINES_API_KEY:-0p3n-w3bu!}
      # Disable user authentication for local/internal deployments.
      - WEBUI_AUTH=false
      # Persist settings and conversation history across restarts.
      - DATA_DIR=/app/backend/data
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      pipelines:
        condition: service_healthy
    restart: unless-stopped

