 #   environment:
 #     - NEO4J_AUTH=neo4j/password
 #   volumes:
 #     - neo4j_data:/data
 #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

